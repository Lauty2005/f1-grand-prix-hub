# ═══════════════════════════════════════════════════════════════════════════════
# ARCHIVO 3: .github/workflows/weekly-standings.yml
# Lunes 10:00 UTC — Standings post-carrera
# ═══════════════════════════════════════════════════════════════════════════════
---
name: 📊 Weekly Standings Article

on:
  schedule:
    - cron: '0 10 * * 1'   # Lunes 10:00 UTC (1h después del preview)
  workflow_dispatch:

jobs:
  generate-standings:
    name: Generate Standings Article
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📅 Log info
        run: |
          echo "📊 Weekly Standings Generator"
          echo "📅 Fecha: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: 🔍 Debug URL
        run: echo "URL → ${{ secrets.API_BASE_URL }}/api/cron/weekly-standings"

      - name: 🚀 Call standings endpoint
        id: generate
        run: |
          RESPONSE=$(curl \
            --silent --show-error --fail-with-body \
            --retry 3 --retry-delay 30 --retry-all-errors \
            --max-time 120 \
            --write-out "\n__HTTP_STATUS__:%{http_code}" \
            -X POST "${{ secrets.API_BASE_URL }}/api/cron/weekly-standings" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "__HTTP_STATUS__:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "__HTTP_STATUS__:")

          echo "📨 HTTP Status: $HTTP_STATUS"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          echo "http_status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "response_body=$BODY"      >> $GITHUB_OUTPUT

          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "❌ HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: 📊 Summary
        if: always()
        env:
          BODY: ${{ steps.generate.outputs.response_body }}
        run: |
          TRIGGERED=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('triggered','?'))" 2>/dev/null)
          RACE=$(echo "$BODY"      | python3 -c "import sys,json; print(json.load(sys.stdin).get('race','N/A'))" 2>/dev/null)
          echo "GP: $RACE | Generado: $TRIGGERED"

      - name: 📬 Telegram — éxito
        if: success()
        continue-on-error: true
        env:
          BODY: ${{ steps.generate.outputs.response_body }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TRIGGERED=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('triggered','?'))" 2>/dev/null || echo "?")
          RACE=$(echo "$BODY"      | python3 -c "import sys,json; print(json.load(sys.stdin).get('race','N/A'))" 2>/dev/null || echo "N/A")
          MESSAGE=$(echo "$BODY"   | python3 -c "import sys,json; print(json.load(sys.stdin).get('message',''))" 2>/dev/null || echo "")
          if [[ "$TRIGGERED" == "True" || "$TRIGGERED" == "true" ]]; then
            TEXT="📊 Standings semanal generado%0A%0AGP: $RACE%0A%0ARevisá en: https://f1grandprixhub.com/admin.html"
          else
            TEXT="📊 Weekly Standings: sin contenido hoy%0A%0A$MESSAGE"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=$TEXT"

      - name: 📬 Telegram — fallo
        if: failure()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=❌ Weekly Standings FALLÓ%0A%0ARevisá el log: ${RUN_URL}"
