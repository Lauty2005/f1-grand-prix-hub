name: 🏎️ Daily Content Generator

on:
  schedule:
    # 09:00 hs Argentina (UTC-3) → 12:00 UTC
    - cron: '0 12 * * *'
    # 13:00 hs Argentina (UTC-3) → 16:00 UTC
    - cron: '0 16 * * *'
    # 20:00 hs Argentina (UTC-3) → 23:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch:
    # Permite disparar el workflow manualmente desde la UI de GitHub
    # (útil para testear sin esperar el cron)
    inputs:
      dates:
        description: 'Fechas a filtrar YYYY-MM-DD separadas por espacio (vacío = todas las recientes)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run: scrape y genera sin publicar a la API'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  publish-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # necesario para git push del publicados.json actualizado

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: f1_agent/requirements.txt

      # ── 3. Dependencias ───────────────────────────────────────────────────────
      - name: Instalar dependencias Python
        run: pip install -r f1_agent/requirements.txt

      # ── 4. Ejecutar el agente ─────────────────────────────────────────────────
      - name: Ejecutar agente F1
        id: agent
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          F1_API_URL:       ${{ secrets.F1_API_URL }}       # ej: https://f1-grand-prix-hub.onrender.com
          CRON_SECRET:   ${{ secrets.CRON_SECRET }}   # JWT del admin (sin "Bearer ")
          DRY_RUN:          ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_DATES:      ${{ github.event.inputs.dates || '' }}
          MAX_ARTICLES:     '2'
        run: |
          python f1_agent/main.py \
            --published-registry f1_agent/publicados.json \
            ${{ env.INPUT_DATES && format('--dates {0}', env.INPUT_DATES) || '' }}

      # ── 5. Commit del registro de publicados ──────────────────────────────────
      - name: Commit publicados.json
        run: |
          git config --global user.name  "F1 Content Agent"
          git config --global user.email "agent@f1grandprixhub.com"
          git add f1_agent/publicados.json
          # Solo hace commit si hay cambios reales (exit 0 si no hay nada)
          git diff --staged --quiet || \
            git commit -m "🏎️ [agent] publicados.json actualizado $(date +'%Y-%m-%d')"
          git push

      # ── 6. Telegram — éxito ──────────────────────────────────────────────────
      - name: 📬 Telegram — éxito
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=🏎️ F1 Agent completado%0A%0ABorradores nuevos listos para revisión.%0ARevisá en: https://f1grandprixhub.com/admin.html"

      # ── 7. Telegram — fallo ───────────────────────────────────────────────────
      - name: 📬 Telegram — fallo
        if: failure()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=❌ F1 Agent FALLÓ%0A%0ARevisá el log: ${RUN_URL}"