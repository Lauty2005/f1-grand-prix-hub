name: F1 Off-Weekend Content Agent

on:
  schedule:
    # Lunes a viernes a las 12:00 UTC = 09:00 AM Argentina (UTC-3)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    # Permite disparar el workflow manualmente desde la UI de GitHub
    # (útil para testear sin esperar el cron)
    inputs:
      dates:
        description: 'Fechas a filtrar YYYY-MM-DD separadas por espacio (vacío = todas las recientes)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run: scrape y genera sin publicar a la API'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  publish-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # necesario para git push del publicados.json actualizado

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: f1_agent/requirements.txt

      # ── 3. Dependencias ───────────────────────────────────────────────────────
      - name: Instalar dependencias Python
        run: pip install -r f1_agent/requirements.txt

      # ── 4. Ejecutar el agente ─────────────────────────────────────────────────
      - name: Ejecutar agente F1
        id: agent
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          F1_API_URL:       ${{ secrets.F1_API_URL }}       # ej: https://f1-grand-prix-hub.onrender.com
          F1_ADMIN_TOKEN:   ${{ secrets.F1_ADMIN_TOKEN }}   # JWT del admin (sin "Bearer ")
          DRY_RUN:          ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_DATES:      ${{ github.event.inputs.dates || '' }}
        run: |
          python f1_agent/main.py \
            --published-registry f1_agent/publicados.json \
            ${{ env.INPUT_DATES && format('--dates {0}', env.INPUT_DATES) || '' }}

      # ── 5. Commit del registro de publicados ──────────────────────────────────
      - name: Commit publicados.json
        run: |
          git config --global user.name  "F1 Content Agent"
          git config --global user.email "agent@f1grandprixhub.com"
          git add f1_agent/publicados.json
          # Solo hace commit si hay cambios reales (exit 0 si no hay nada)
          git diff --staged --quiet || \
            git commit -m "🏎️ [agent] publicados.json actualizado $(date +'%Y-%m-%d')"
          git push

      # ── 6. Notificación Slack (solo en éxito y si está configurado) ───────────
      - name: Notificación Slack
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *F1 Agent* publicó borradores nuevos el `${{ steps.agent.outputs.date }}`.\nRevisalos en el admin: https://f1-grand-prix-hub.vercel.app/admin.html\nArtículos procesados: *${{ steps.agent.outputs.count }}*"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # ── 7. Notificación de fallo ──────────────────────────────────────────────
      - name: Notificación de fallo
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔴 *F1 Agent falló* el `${{ steps.agent.outputs.date }}`.\nRevisá el log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
